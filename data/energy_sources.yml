# Energy source definitions for the static MFC setup tool.
# Type can be supercap, cap, battery, or another project-specific storage type.
# Technology can capture chemistry or construction, for example EDLC, Li-ion, LiFePO4, ceramic.
# Leakage is entered as current in uA and converted to mW at the selected usable Vmax.
# Replace example values with measured leakage wherever possible.
# Set datasheet_url to the vendor datasheet or product page when known.

- id: workbook-reference-40f
  name: 40 F reference energy source
  type: supercap
  technology: EDLC
  summary: Covers the workbook default target plus the default safety margin.
  capacitance_f: 40
  voltage_max_v: 4.2
  voltage_min_v: 0
  leakage_current_ua: 5
  esr_ohm: 0.10
  datasheet_url: ""
  notes: Excel-style reference storage element.

- id: starter-10f
  name: 10 F starter energy source
  type: supercap
  technology: EDLC
  summary: Smaller buffer for short duty cycles or reduced energy targets.
  capacitance_f: 10
  voltage_max_v: 5.5
  voltage_min_v: 0
  leakage_current_ua: 8
  esr_ohm: 0.18
  datasheet_url: ""
  notes: Example value, replace with datasheet or measured leakage.

- id: reserve-50f
  name: 50 F reserve energy source
  type: supercap
  technology: EDLC
  summary: Larger buffer for slow charging or higher energy payloads.
  capacitance_f: 50
  voltage_max_v: 5.0
  voltage_min_v: 0
  leakage_current_ua: 12
  esr_ohm: 0.08
  datasheet_url: ""
  notes: Example value, replace with datasheet or measured leakage.
