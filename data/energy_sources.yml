# Energy source definitions for the static MFC setup tool.
# Type can be supercap, cap, battery, or another project-specific storage type.
# Technology can capture chemistry or construction, for example EDLC, Li-ion, LiFePO4, ceramic.
# Leakage is entered as current in uA and converted to mW at the selected usable Vmax.
# Replace example values with measured leakage wherever possible.
# Set datasheet_url to the vendor datasheet or product page when known.

- id: tplc-3r8-60f
  name: Tecate TPLC-3R8/60MR10X25
  type: supercap
  technology: LIC
  summary: 60 F 3.8 V hybrid lithium-ion capacitor with very low leakage current and high energy density.
  capacitance_f: 60
  voltage_max_v: 3.8
  voltage_min_v: 2.2
  leakage_current_ua: 5
  esr_ohm: 0.245
  datasheet_url: "https://ds.tecategroup.com/data_sheet.php?i=TPLC-3R8/60MR10X25"
  notes: >
    Tecate TPLC hybrid lithium-ion capacitor (LIC). Typical DC ESR is 245 mΩ
    (110 mΩ AC ESR @ 1 kHz). Recommended operating voltage range is
    2.2–3.8 V.

